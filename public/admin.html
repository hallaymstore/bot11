<!doctype html>
<html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crypto Clicker Admin</title><link rel="stylesheet" href="/assets/admin.css"></head><body>
<header><div><b>Crypto Clicker Admin</b><span>Tasks · Shop · Exchange · Requests · Stats</span></div><input id="password" type="password" placeholder="ADMIN_PASSWORD"><button id="login">Load</button></header>
<main id="app" class="hidden">
  <section class="grid" id="stats"></section>
  <section class="panel"><h2>Settings</h2><div class="form six"><input id="referralJoinBonus" placeholder="referralJoinBonus"><input id="referralActiveBonus" placeholder="referralActiveBonus"><input id="referralActiveNeed" placeholder="referralActiveNeed"><input id="transferFeePercent" placeholder="transferFeePercent"><input id="dailyBaseReward" placeholder="dailyBaseReward"><input id="dailyStreakBonus" placeholder="dailyStreakBonus"><button id="saveSettings">Save Settings</button></div></section>
  <section class="panel"><h2>Advertiser Tasks</h2><div class="form"><input id="taskId" placeholder="id"><input id="taskTitle" placeholder="title"><input id="taskReward" type="number" placeholder="reward"><select id="taskType"><option>subscribe</option><option>referral</option><option>streak</option><option>league</option><option>tap</option><option>manual</option></select><input id="taskLink" placeholder="channel/group link"><input id="taskChatId" placeholder="chatId e.g. @channel or -100..."><input id="taskAdvertiser" placeholder="advertiser"><input id="taskTarget" type="number" placeholder="target"><button id="saveTask">Save Task</button></div><div id="tasks" class="list"></div></section>
  <section class="panel"><h2>Shop Items</h2><div class="form"><input id="shopId" placeholder="id"><input id="shopTitle" placeholder="title"><input id="shopDesc" placeholder="description"><input id="shopCost" type="number" placeholder="cost"><select id="shopType"><option>energy</option><option>miner</option><option>tap_power</option><option>multiplier</option><option>skin</option><option>coins</option></select><input id="shopValue" placeholder="value"><button id="saveShop">Save Shop</button></div><div id="shop" class="list"></div></section>
  <section class="panel"><h2>Game Coin Exchange</h2><div class="form"><input id="exId" placeholder="id"><input id="exGame" placeholder="game"><input id="exTitle" placeholder="title"><input id="exCost" type="number" placeholder="cost"><select id="exStatus"><option>soon</option><option>active</option><option>paused</option></select><input id="exNote" placeholder="note"><button id="saveExchange">Save Exchange</button></div><div id="exchange" class="list"></div></section>
  <section class="panel"><h2>User Balance Adjust</h2><div class="form small"><input id="userKey" placeholder="telegramId / referral code / @username"><input id="adjustAmount" type="number" placeholder="amount"><select id="adjustMode"><option value="add">add/subtract</option><option value="set">set balance</option></select><button id="adjustUser">Apply</button></div><div id="users" class="table"></div></section>
  <section class="panel"><h2>Requests</h2><div id="requests" class="list"></div></section>
</main><div id="toast"></div><script src="/assets/admin.js"></script></body></html>
